```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
height:100vh;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:230px;
background:#1f2937;
color:white;
padding-top:30px;
position:fixed;
height:100%;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px 25px;
transition:0.3s;
}

.sidebar a:hover{
background:#374151;
}

.sidebar i{
margin-right:10px;
}

/* Main Content */

.main{
margin-left:230px;
width:100%;
padding:40px;
}

/* Card Form */

.card{
max-width:450px;
margin:auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 2px 12px rgba(0,0,0,0.1);
}

.card h2{
text-align:center;
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
}

.input-field{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#374151;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<a href="/dashboard/"><i class="fa fa-home"></i> Dashboard</a>
<a href="/add-admin/"><i class="fa fa-user-plus"></i> Add Admin</a>
<a href="/manage-admin/"><i class="fa fa-users"></i> Manage Admin</a>
<a href="/logout/"><i class="fa fa-sign-out-alt"></i> Logout</a>

</div>


<div class="main">

<div class="card">

<h2>Add Admin</h2>

<form method="POST">
{% csrf_token %}

<div class="input-group">
{{ form.username }}
</div>

<div class="input-group">
{{ form.password }}
</div>

<button type="submit">
<i class="fa fa-user-plus"></i> Create Admin
</button>

</form>

</div>

</div>

</body>
</html>
```
